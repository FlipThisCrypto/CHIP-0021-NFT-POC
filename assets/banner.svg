<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Orchard — Living Tree NFTs. A tree growing from seed to a golden legendary tree.">
  <!-- sky -->
  <rect width="1200" height="300" fill="#0F1A13"/>
  <!-- stars / fireflies -->
  <g fill="#E0A93B" opacity="0.5">
    <circle cx="520" cy="48" r="1.6"/><circle cx="980" cy="40" r="1.4"/><circle cx="1150" cy="70" r="1.6"/>
    <circle cx="700" cy="36" r="1.2"/><circle cx="860" cy="60" r="1.3"/><circle cx="1060" cy="96" r="1.2"/>
  </g>
  <g fill="#7FB08A" opacity="0.35">
    <circle cx="610" cy="70" r="1.2"/><circle cx="760" cy="92" r="1.1"/><circle cx="930" cy="84" r="1.1"/>
  </g>

  <!-- soil -->
  <rect x="0" y="236" width="1200" height="64" fill="#241C12"/>
  <rect x="0" y="234" width="1200" height="3" fill="#3A2E1C"/>
  <!-- evolution baseline -->
  <line x1="612" y1="248" x2="1140" y2="248" stroke="#3A2E1C" stroke-width="1.5" stroke-dasharray="2 7"/>

  <!-- title -->
  <text x="60" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="#F2F5EC" letter-spacing="1">THE ORCHARD</text>
  <text x="62" y="158" font-family="Georgia, serif" font-size="24" fill="#E0A93B">Living Tree NFTs</text>
  <text x="62" y="190" font-family="ui-monospace, 'Courier New', monospace" font-size="14.5" fill="#9FB3A2">Plant a sensor · prove it's alive · watch the NFT grow</text>
  <text x="62" y="214" font-family="ui-monospace, monospace" font-size="12" fill="#6f8a74">real hardware → verified uptime → living, on-chain art</text>

  <!-- ── growth row (seed → legendary), baseline y=236 ── -->

  <!-- 1 · seed -->
  <g>
    <ellipse cx="650" cy="236" rx="14" ry="4" fill="#3A2E1C"/>
    <line x1="650" y1="234" x2="650" y2="224" stroke="#4C9A4B" stroke-width="3"/>
    <ellipse cx="645" cy="224" rx="5" ry="3" fill="#5BA85A"/>
    <ellipse cx="655" cy="224" rx="5" ry="3" fill="#5BA85A"/>
  </g>

  <!-- 2 · sprout -->
  <g>
    <line x1="758" y1="236" x2="758" y2="208" stroke="#5A3E24" stroke-width="4"/>
    <circle cx="758" cy="200" r="14" fill="#4C9A4B"/>
    <circle cx="749" cy="207" r="8" fill="#5BA85A"/>
    <circle cx="767" cy="207" r="8" fill="#3E8C40"/>
  </g>

  <!-- 3 · sapling -->
  <g>
    <rect x="862" y="190" width="8" height="46" fill="#5A3E24"/>
    <circle cx="866" cy="178" r="20" fill="#4C9A4B"/>
    <circle cx="850" cy="188" r="14" fill="#5BA85A"/>
    <circle cx="882" cy="188" r="14" fill="#3E8C40"/>
    <rect x="872" y="174" width="6" height="6" fill="#FF9F43"/>
  </g>

  <!-- 4 · young tree -->
  <g>
    <ellipse cx="980" cy="238" rx="26" ry="5" fill="#E0A93B" opacity="0.18"/>
    <rect x="975" y="166" width="11" height="70" fill="#5A3E24"/>
    <circle cx="980" cy="152" r="26" fill="#4C9A4B"/>
    <circle cx="958" cy="166" r="17" fill="#5BA85A"/>
    <circle cx="1002" cy="166" r="17" fill="#3E8C40"/>
    <circle cx="980" cy="172" r="16" fill="#4C9A4B"/>
    <rect x="966" y="160" width="7" height="7" fill="#FF9F43"/>
    <rect x="992" y="158" width="7" height="7" fill="#5C6BC0"/>
    <rect x="977" y="146" width="7" height="7" fill="#E0473A"/>
  </g>

  <!-- 5 · fruiting / legendary -->
  <g>
    <!-- roots glow -->
    <ellipse cx="1100" cy="240" rx="46" ry="9" fill="#FFD24A" opacity="0.14"/>
    <ellipse cx="1100" cy="238" rx="28" ry="6" fill="#FFD24A" opacity="0.30"/>
    <!-- halo -->
    <ellipse cx="1100" cy="112" rx="50" ry="16" fill="none" stroke="#FFC83D" stroke-width="2" opacity="0.6"/>
    <circle cx="1052" cy="112" r="2" fill="#FFC83D"/><circle cx="1148" cy="112" r="2" fill="#FFC83D"/><circle cx="1100" cy="96" r="2.2" fill="#FFC83D"/>
    <!-- trunk -->
    <rect x="1093" y="150" width="14" height="86" fill="#5A3E24"/>
    <!-- canopy -->
    <circle cx="1100" cy="138" r="32" fill="#4C9A4B"/>
    <circle cx="1074" cy="154" r="21" fill="#5BA85A"/>
    <circle cx="1126" cy="154" r="21" fill="#3E8C40"/>
    <circle cx="1100" cy="160" r="20" fill="#4C9A4B"/>
    <!-- fruit -->
    <rect x="1083" y="146" width="8" height="8" fill="#FF9F43"/>
    <rect x="1114" y="144" width="8" height="8" fill="#5C6BC0"/>
    <rect x="1097" y="128" width="8" height="8" fill="#E0473A"/>
    <!-- gold tag -->
    <rect x="1091" y="188" width="18" height="13" rx="2" fill="#FFC83D" stroke="#B8902B" stroke-width="1.5"/>
    <!-- badges -->
    <circle cx="1066" cy="120" r="5" fill="#FFC83D" stroke="#7a5a12" stroke-width="1"/>
    <circle cx="1134" cy="120" r="5" fill="#2DD4BF" stroke="#0E8C7E" stroke-width="1"/>
  </g>

  <!-- stage captions -->
  <g font-family="ui-monospace, monospace" font-size="10.5" fill="#6f8a74" text-anchor="middle">
    <text x="650" y="266">seed</text>
    <text x="758" y="266">sprout</text>
    <text x="866" y="266">sapling</text>
    <text x="980" y="266">young</text>
    <text x="1100" y="266" fill="#E0A93B">legendary</text>
  </g>
</svg>

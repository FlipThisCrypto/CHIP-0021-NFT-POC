# Publishes the static prototypes (the Living Tree renderer) to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# After it runs, the renderer is at:  https://<user>.github.io/CHIP-0021-NFT-POC/living-tree-renderer/
name: Deploy prototypes to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "prototypes/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototypes
      - id: deployment
        uses: actions/deploy-pages@v4
